name: Validate PRs

on:
    pull_request:
        branches: [main]

env:
    DATABASE_URL: ${{ secrets.DATABASE_URL }}
    BETTER_AUTH_SECRET: "better-auth-e2e-secret-1234567890"
    VITE_SAAS_URL: "http://localhost:3000"
    VITE_MARKETING_URL: "http://localhost:3001"
    VITE_DOCS_URL: "http://localhost:3002"

jobs:
    lint:
        name: Lint + format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Oxlint + Oxfmt
              run: pnpm verify

    type-check:
        name: Type-check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run tsc --noEmit across the workspace
              run: pnpm type-check

    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Build every app
              run: pnpm build

    unit:
        name: Unit tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run Vitest
              run: pnpm test

    e2e:
        name: Playwright e2e
        timeout-minutes: 60
        runs-on: ubuntu-latest
        needs: [lint, type-check, build, unit]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run Playwright tests for the marketing app
              run: pnpm --filter marketing e2e:ci
            - name: Run Playwright tests for the SaaS app
              run: pnpm --filter saas e2e:ci
            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: apps/saas/playwright-report/
                  retention-days: 30
